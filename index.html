<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Radar de Voos — Acompanhamento ao vivo</title>
  <meta name="description" content="Acompanhe voos em tempo real em um mapa interativo usando dados ADS-B da airplanes.live." />

  <!-- Leaflet -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="map"></div>

  <!-- Painel de cabeçalho -->
  <header class="panel" id="topbar">
    <div class="brand">
      <span class="brand__icon" aria-hidden="true">✈</span>
      <div class="brand__text">
        <h1>Radar de Voos</h1>
        <p id="subtitle">Voos ao vivo na área visível</p>
      </div>
    </div>

    <div class="stats">
      <div class="stat">
        <span class="stat__value" id="count">—</span>
        <span class="stat__label">aeronaves</span>
      </div>
      <div class="stat">
        <span class="stat__value" id="updated">—</span>
        <span class="stat__label">última atualização</span>
      </div>
    </div>

    <div class="controls">
      <button id="locate" class="btn" title="Centralizar na minha localização">📍 Minha posição</button>
      <button id="sjc" class="btn" title="Ir para São José dos Campos">🛫 SJC</button>
      <label class="toggle" title="Atualizar automaticamente">
        <input type="checkbox" id="autoRefresh" checked />
        <span>Auto</span>
      </label>
      <button id="refresh" class="btn btn--primary" title="Atualizar agora">↻</button>
    </div>
  </header>

  <!-- Mensagem de status / erro -->
  <div id="status" class="status status--hidden" role="status"></div>

  <!-- Rodapé com créditos -->
  <footer class="credits">
    Dados:
    <a href="https://airplanes.live" target="_blank" rel="noopener">airplanes.live</a>
    · Mapa: © OpenStreetMap · CARTO
  </footer>

  <!-- Leaflet JS -->
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>
  <script src="app.js"></script>
</body>
</html>
